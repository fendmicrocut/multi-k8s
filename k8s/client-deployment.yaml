apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      component: web
  template:
    metadata:
      labels:
        component: web
    spec:
      containers:
        - name: client
          image: mysc-d-ase-img-cr.azurecr.io/client:$IMAGE_TAG
          ports:
            - containerPort: 3000
