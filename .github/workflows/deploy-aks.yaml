name: Deploy Multi-Container App to AKS

on:
  push:
    branches:
      - master

env:
  RESOURCE_GROUP: "mysc-d-ase-k8s-rg"     # Azure Resource Group name
  ACR_HOST: "myscdaseimgcr"           # ACR HOST without '.azurecr.io'
  AKS_NAME: "mysc-d-ase-01-aks"           # AKS Cluster name

jobs:
  # JOB 1: Detect which folders have changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # Expose the filter decisions as job outputs for downstream steps
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Check Paths for Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client: ['client/**']
            server: ['server/**']
            worker: ['worker/**']

  # JOB 2: Build images in parallel (only if changes were detected)
  build-images:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: client
            folder: client
            should_run: 'true'
          - service: server
            folder: server
            should_run: 'true'
          - service: worker
            folder: worker
            should_run: 'true'
    
    steps:
      - name: Checkout Source Code
        # Only spawn the runner if the path filter returned 'true'
        if: ${{ matrix.should_run == 'true' }}
        uses: actions/checkout@v4

      - name: Azure Login
        if: ${{ matrix.should_run == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Container Registry Login
        if: ${{ matrix.should_run == 'true' }}
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_HOST }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Custom Images
        if: ${{ matrix.should_run == 'true' }}
        run: |
          docker build -t ${{ env.ACR_HOST }}.azurecr.io/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.folder }}
          docker push ${{ env.ACR_HOST }}.azurecr.io/${{ matrix.service }}:${{ github.sha }}

  # JOB 3: Deploy manifests to AKS
  deploy-to-aks:
    runs-on: ubuntu-latest
    # always() ensures this runs even if Job 2 is entirely skipped because nothing changed!
    needs: [detect-changes, build-images]
    if: always() && (needs.detect-changes.result == 'success') && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_NAME }}
          admin: 'true'

    - name: Deploy Everything via Kubectl
      run: |
        export IMAGE_TAG="${{ github.sha }}"
        export PG_PASSWORD="${{ secrets.PG_PASSWORD }}"
        mkdir processed-k8s
        for file in k8s/*; do
          if [ -f "$file" ]; then
            envsubst < "$file" > "processed-k8s/$(basename "$file")"
          fi
        done
        kubectl apply -f processed-k8s/